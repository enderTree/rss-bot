<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>
  <meta name="description" content="RSS Reader，一个将订阅信息聚合展示的工具，便于了解近期关注的信息。">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23409eff' d='M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19 7.38 20 6.18 20C5 20 4 19 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z'/></svg>">
  <style>
    body {
      font-family: "Avenir", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-align: center;
      color: #2c3e50;
      margin-top: 30px;
      background-color: #f5f7fa;
    }

    .card-header {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
    }

    .list-item {
      display: flex;
      align-items: center;
      text-align: left;
      width: 100%;
    }

    .list-item-title {
      display: flex;
      flex-grow: 1;
      text-align: left;
      width: 100%;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .list-item-title span {
      color: #909399;
      margin-right: 4px;
      flex-shrink: 0;
    }

    a {
      color: #303133;
      text-decoration: none;
    }

    a:hover {
      color: #409eff;
      text-decoration: underline;
    }

    .feed-col {
      margin-bottom: 20px;
    }

    .box-card {
      height: 420px;
      display: flex;
      flex-direction: column;
    }

    .box-card .el-card__header {
      padding: 14px 20px;
      border-bottom: 1px solid #ebeef5;
    }

    .box-card .el-card__body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .card-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-footer {
      padding: 10px 20px;
      border-top: 1px solid #ebeef5;
      text-align: right;
    }

    .time {
      font-size: 12px;
      color: #909399;
    }

    .el-header {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .el-header h1 {
      margin: 0;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-info {
      font-size: 14px;
      color: #909399;
      font-weight: normal;
      margin-left: 15px;
    }

    .header-actions {
      position: absolute;
      right: 0;
      display: flex;
      gap: 10px;
    }

    .el-footer {
      padding: 20px;
    }

    .el-footer a {
      color: #409eff;
    }

    .scroll-content {
      padding: 15px 20px;
    }

    /* Dark mode */
    [data-theme="dark"] body {
      background-color: #141414;
      color: #e5eaf3;
    }

    [data-theme="dark"] .el-card {
      background-color: #1f1f1f;
      border-color: #363637;
    }

    [data-theme="dark"] .el-card__header {
      border-color: #363637;
    }

    [data-theme="dark"] .card-footer {
      border-color: #363637;
    }

    [data-theme="dark"] a {
      color: #e5eaf3;
    }

    [data-theme="dark"] a:hover {
      color: #409eff;
    }

    [data-theme="dark"] .el-header,
    [data-theme="dark"] .el-footer {
      background-color: transparent;
    }
  </style>
</head>

<body>
  <div id="app">
    <el-container>
      <el-header>
        <h1>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="#409eff">
            <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19 7.38 20 6.18 20C5 20 4 19 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
          </svg>
          RSS Reader
          <span class="header-info" v-if="lastUpdated">
            {{ countdown > 0 ? countdown + ' s' : '' }}
          </span>
        </h1>
        <div class="header-actions">
          <el-button type="primary" size="small" @click="handleRefresh" :loading="refreshing">
            刷新数据
          </el-button>
          <el-button size="small" @click="toggleTheme">
            {{ isDark ? '☀️' : '🌙' }}
          </el-button>
          <el-button size="small" @click="showSettings = true">
            ⚙️
          </el-button>
        </div>
      </el-header>

      <el-main v-loading="loading" element-loading-text="拼命加载中">
        <el-row :gutter="20">
          <el-col 
            :xs="24" :sm="12" :md="8" :lg="6" 
            v-for="(feed, index) in feeds" 
            :key="index" 
            class="feed-col"
          >
            <el-card class="box-card" shadow="hover">
              <template #header>
                <div class="card-header">
                  <span>{{ feed.source }}</span>
                </div>
              </template>
              <div class="card-body">
                <el-scrollbar height="300px">
                  <div class="scroll-content">
                    <div v-if="feed.items && feed.items.length > 0">
                      <div class="list-item" v-for="(item, i) in feed.items" :key="i">
                        <div class="list-item-title">
                          <span>{{ i + 1 }}.</span>
                          <el-link :href="item.link" target="_blank" :title="item.title">
                            {{ item.title }}
                          </el-link>
                        </div>
                      </div>
                    </div>
                    <el-empty v-else description="暂无文章" :image-size="50"></el-empty>
                  </div>
                </el-scrollbar>
              </div>
              <div class="card-footer">
                <time class="time">{{ formatTime(feed.lastUpdated) }}</time>
              </div>
            </el-card>
          </el-col>
        </el-row>

        <el-empty v-if="!loading && feeds.length === 0" description="暂无订阅源"></el-empty>
      </el-main>

      <el-footer>
        <el-link href="https://github.com/enderTree/rss-bot" target="_blank">RSS Bot</el-link>
        <span> | </span>
        <span>Powered by GitHub Actions</span>
      </el-footer>
    </el-container>

    <!-- Settings Dialog -->
    <el-dialog v-model="showSettings" title="设置" width="420px">
      <el-form label-position="top">
        <el-form-item label="自动刷新间隔（秒）">
          <el-select v-model="autoRefreshInterval" style="width: 100%">
            <el-option label="关闭" :value="0"></el-option>
            <el-option label="60 秒" :value="60"></el-option>
            <el-option label="120 秒" :value="120"></el-option>
            <el-option label="300 秒" :value="300"></el-option>
            <el-option label="600 秒" :value="600"></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="GitHub Token（用于页面内触发抓取）">
          <el-input v-model="githubToken" placeholder="ghp_xxxxxxxxxxxx" show-password></el-input>
          <div style="font-size: 12px; color: #909399; margin-top: 5px;">
            <el-link href="https://github.com/settings/tokens/new?scopes=repo,workflow" target="_blank" type="primary">
              创建 Token
            </el-link>
            （需要 repo 和 workflow 权限）
          </div>
        </el-form-item>
        <el-form-item label="仓库地址">
          <el-input v-model="githubRepo" placeholder="enderTree/rss-bot"></el-input>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="showSettings = false">取消</el-button>
        <el-button type="primary" @click="saveSettings">保存</el-button>
      </template>
    </el-dialog>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script>
    const { createApp, ref, onMounted, onUnmounted } = Vue;

    const app = createApp({
      setup() {
        const feeds = ref([]);
        const loading = ref(true);
        const refreshing = ref(false);
        const showSettings = ref(false);
        const lastUpdated = ref('');
        const countdown = ref(0);
        const isDark = ref(false);

        const autoRefreshInterval = ref(parseInt(localStorage.getItem('auto_refresh') || '60'));
        const githubToken = ref(localStorage.getItem('github_token') || '');
        const githubRepo = ref(localStorage.getItem('github_repo') || 'enderTree/rss-bot');

        let countdownTimer = null;
        let refreshTimer = null;

        const fetchData = async () => {
          try {
            const response = await fetch('rss-data.json?t=' + Date.now());
            const data = await response.json();
            feeds.value = data.sources || [];
            lastUpdated.value = formatTime(data.lastUpdated);
            resetCountdown();
          } catch (error) {
            console.error('Fetch error:', error);
            ElementPlus.ElMessage.error('加载失败，请稍后重试');
          } finally {
            loading.value = false;
          }
        };

        const resetCountdown = () => {
          if (autoRefreshInterval.value > 0) {
            countdown.value = autoRefreshInterval.value;
          }
        };

        const startTimers = () => {
          if (countdownTimer) clearInterval(countdownTimer);
          if (refreshTimer) clearInterval(refreshTimer);

          if (autoRefreshInterval.value > 0) {
            countdown.value = autoRefreshInterval.value;

            countdownTimer = setInterval(() => {
              if (countdown.value > 0) {
                countdown.value--;
              } else {
                countdown.value = autoRefreshInterval.value;
              }
            }, 1000);

            refreshTimer = setInterval(() => {
              fetchData();
            }, autoRefreshInterval.value * 1000);
          }
        };

        const handleRefresh = async () => {
          if (!githubToken.value || !githubRepo.value) {
            window.open(`https://github.com/${githubRepo.value}/actions/workflows/rss-fetcher.yml`, '_blank');
            ElementPlus.ElMessage.info('请在 GitHub Actions 页面点击 "Run workflow"');
            return;
          }

          refreshing.value = true;
          try {
            const response = await fetch(
              `https://api.github.com/repos/${githubRepo.value}/actions/workflows/rss-fetcher.yml/dispatches`,
              {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${githubToken.value}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ref: 'main' })
              }
            );

            if (response.status === 204) {
              ElementPlus.ElMessage.success('已触发 RSS 抓取，请等待 1-2 分钟后刷新');
            } else if (response.status === 401) {
              ElementPlus.ElMessage.error('Token 无效，请检查配置');
            } else {
              ElementPlus.ElMessage.error('触发失败');
            }
          } catch (error) {
            ElementPlus.ElMessage.error('网络错误');
          }
          refreshing.value = false;
        };

        const saveSettings = () => {
          localStorage.setItem('auto_refresh', autoRefreshInterval.value);
          localStorage.setItem('github_token', githubToken.value);
          localStorage.setItem('github_repo', githubRepo.value);
          showSettings.value = false;
          startTimers();
          ElementPlus.ElMessage.success('设置已保存');
        };

        const toggleTheme = () => {
          isDark.value = !isDark.value;
          document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
          localStorage.setItem('theme', isDark.value ? 'dark' : 'light');
        };

        const loadTheme = () => {
          const saved = localStorage.getItem('theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          isDark.value = saved ? saved === 'dark' : prefersDark;
          document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
        };

        const formatTime = (dateStr) => {
          if (!dateStr) return '';
          const date = new Date(dateStr);
          return date.toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        };

        onMounted(() => {
          loadTheme();
          fetchData();
          startTimers();
        });

        onUnmounted(() => {
          if (countdownTimer) clearInterval(countdownTimer);
          if (refreshTimer) clearInterval(refreshTimer);
        });

        return {
          feeds,
          loading,
          refreshing,
          showSettings,
          lastUpdated,
          countdown,
          isDark,
          autoRefreshInterval,
          githubToken,
          githubRepo,
          handleRefresh,
          saveSettings,
          toggleTheme,
          formatTime
        };
      }
    });

    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
